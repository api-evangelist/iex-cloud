description: >-
  IEX Cloud was a cloud-based financial data platform from IEX Group offering market data,
  fundamentals, news, options, and reference APIs at https://cloud.iexapis.com/v1. The service
  was sunset on August 31, 2024 by IEX Group. The entry below is preserved as historical
  reference for migration patterns; endpoints are no longer reachable.
notes: IEX Cloud sunset on 2024-08-31. APIs are no longer reachable. Migrate to alternatives
  such as Polygon.io, Tiingo, Alpha Vantage, or Finnhub.
apis:
  - aid: iex-cloud:core-data-api
    name: IEX Cloud Core Data API (sunset)
    tags:
      - Stocks
      - Market Data
      - Sunset
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://cloud.iexapis.com/v1
    humanURL: https://iexcloud.io/docs/api
    description: >-
      Real-time and historical US equity quotes, intraday and historical prices, OHLCV charts,
      news, dividends, splits, options chains, fundamentals, and corporate actions. Pricing was
      message-based: each endpoint cost a number of "credits" against a monthly allowance. SUNSET
      August 31, 2024.
    properties:
      - type: Documentation
        url: https://iexcloud.io/docs/api
      - type: Sunset Notice
        url: https://iexcloud.io/community/blog/iex-cloud-end-of-life-announcement
    x-features:
      - Real-time and historical quotes (sunset)
      - Fundamentals and corporate actions (sunset)
      - News, options, splits, dividends (sunset)
      - Message-based credit pricing (sunset)
    x-use-cases:
      - Historical reference only
      - Migration patterns to successor providers
