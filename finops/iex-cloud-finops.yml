description: >-
  IEX Cloud sunset on 2024-08-31. Historical billing was monthly subscription with a message-based
  allowance (Launch / Grow / Scale / Business). Existing customers were transitioned to refund or
  alternative providers. This artifact preserves the historical billing model for migration cost
  comparison.
sources:
  - https://iexcloud.io/community/blog/iex-cloud-end-of-life-announcement
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: IEX Cloud (IEX Group)
serviceCategory: Fintech
billingModel:
  pricingCategory: Subscription with Metered Allowance (Sunset)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Subscription
    - Adjustment
focusColumns:
  ServiceName: IEX Cloud Core Data API (sunset)
  ServiceCategory: Fintech
  ProviderName: IEX Cloud
  PublisherName: IEX Cloud
  InvoiceIssuerName: IEX Cloud
  BillingCurrency: USD
  ChargeCategory: Subscription
meters:
  - name: messages
    description: Per-call message cost against the monthly allowance.
    unit: message
    aggregation: sum
    dimensions:
      - token
      - endpoint
principles:
  - name: Visibility
    description: Service sunset; only historical invoices apply.
  - name: Allocation
    description: Allocate any residual refund to the originating cost center.
  - name: Optimization
    description: Migrate consumers to a successor provider; track migration cost delta.
  - name: Accountability
    description: Close out vendor relationship and ensure tokens revoked.
