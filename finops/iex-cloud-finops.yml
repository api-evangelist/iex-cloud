specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: IEX Cloud
providerId: iex-cloud
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Fintech
  - Market Data
  - Sunset
  - FinOps
