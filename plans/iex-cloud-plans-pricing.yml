description: >-
  IEX Cloud reached end-of-life on August 31, 2024. The historical pricing model was a monthly
  subscription with a message (credit) allowance and per-endpoint message costs. Tiers commonly
  cited from the public archive included Launch (free, 50K messages/mo), Grow ($9/mo, 5M),
  Scale ($199/mo, 1B), and Business ($999/mo, 10B). All tiers are sunset; no new sign-ups.
notes: Sunset 2024-08-31. Pricing preserved for historical / migration reference only.
sources:
  - https://web.archive.org/web/20240501000000*/iexcloud.io/pricing
  - https://iexcloud.io/community/blog/iex-cloud-end-of-life-announcement
